<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة حب</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #4d0000, #a20000, #ff1e56);
            font-family: 'Cairo', sans-serif;
        }

        /* النجوم */
        #stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from {
                opacity: 0.2;
            }

            to {
                opacity: 1;
            }
        }

        /* القمر */
        .moon {
            position: absolute;
            top: 60px;
            right: 80px;
            width: 130px;
            height: 130px;
            background: #fffadc;
            border-radius: 50%;
            box-shadow: 0 0 50px white;
        }

        /* الحاوية */
        .container {
            position: relative;
            width: 300px;
            height: 200px;
            cursor: pointer;
        }

        /* الظرف */
        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ff4d6d;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 2;
            transition: 0.5s;
        }

        /* غطاء الظرف */
        .flap {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ff2a55;
            clip-path: polygon(0 0, 50% 50%, 100% 0);
            transform-origin: top;
            transition: 0.5s;
            z-index: 3;
        }

        /* القلب */
        .heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 45px;
            color: #2b0000;
            transition: 0.5s;
            z-index: 4;
        }

        /* الرسالة */
        .letter {
            position: absolute;
            width: 280px;
            height: 190px;
            top: 5px;
            left: 10px;
            background: white;
            border-radius: 10px;
            transition: 1s ease;
            transform-origin: bottom;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            padding: 10px;
            box-sizing: border-box;
        }

        /* محتوى الرسالة */
        .paper-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.5s;
            color: #d1005d;
            text-align: center;
        }

        .love {
            font-size: 13px;
            /* تم تصغير الخط ليتناسب مع طول النص */
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .name {
            font-size: 22px;
            font-weight: bold;
        }

        /* فتح الظرف */
        .open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .open .heart {
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
        }

        /* خروج الرسالة */
        .open .letter {
            transform: translateY(-160px);
            z-index: 3;
        }

        /* ظهور الكلام */
        .open .paper-content {
            opacity: 1;
            transition-delay: 1s;
        }

        /* جملة التلميح السفلية */
        .hint {
            position: absolute;
            bottom: 30px;
            color: white;
            font-size: 15px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div id="stars"></div>
    <div class="moon"></div>

    <div class="container" id="box">
        <div class="envelope">
            <div class="flap"></div>
            <div class="heart">❤</div>
        </div>
        <div class="letter">
            <div class="paper-content">
                <div class="love">"لو كان الحب مجرد كلمات تُكتب على الورق، لملأتُ بحار الأرض حبراً ولأنهيتُ كل أقلامي في
                    وصف ما أشعر به تجاهكِ.. لكنني أدركتُ أن الحب الحقيقي ليس حبراً ولا ورقاً، بل هو نبضٌ يسكن الصدر،
                    وأرواحٌ تُوهب لمن سكنوا الروح."</div>
                <div class="name">بحبك</div>
            </div>
        </div>
    </div>

    <div class="hint">اضغط على القلب ❤</div>

    <audio id="music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        const box = document.getElementById("box");
        const music = document.getElementById("music");

        /* فتح الظرف وتشغيل الموسيقى */
        box.addEventListener("click", () => {
            box.classList.add("open");

            if (music.paused) {
                music.volume = 0; // يبدأ الصوت من الصفر لتأثير الـ Fade-in
                music.play().then(() => {
                    // رفع الصوت تدريجياً
                    let vol = 0;
                    let fadeIn = setInterval(() => {
                        if (vol < 0.9) {
                            vol += 0.1;
                            music.volume = vol;
                        } else {
                            clearInterval(fadeIn);
                        }
                    }, 200);
                }).catch(error => {
                    console.log("تأكد من وجود ملف song.mp3 بجانب الكود");
                });
            }
        });

        /* رسم النجوم الخلفية */
        const starsContainer = document.getElementById("stars");
        for (let i = 0; i < 150; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.top = Math.random() * 100 + "%";
            star.style.left = Math.random() * 100 + "%";
            star.style.animationDuration = (Math.random() * 3 + 1) + "s";
            starsContainer.appendChild(star);
        }
    </script>
</body>

</html>
